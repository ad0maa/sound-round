<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script>
    // Applied before first paint so a persisted accent theme doesn't flash cherry.
    try {
      var t = localStorage.getItem('sr-theme')
      if (t) document.documentElement.dataset.theme = t
    } catch (e) {}
  </script>
</head>

<body>
  <!-- Please keep this div empty -->
  <div id="cedar-app"></div>
</body>

</html>
